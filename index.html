<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dibbo's - Personal Portfolio</title>
    <meta name="description" content="This is Dibbo Das Avi's personal graphic portfolio website" />
    <link rel="shortcut icon" href="./assets/images/Dibbo_logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Profile Selector Modal -->
    <div id="profileSelector" class="profile-selector">
      <div class="profile-selector-content">
        <h2>Who are you?</h2>
        <div class="profile-buttons">
          <button onclick="selectProfile('recruiter')" class="profile-btn">
            <ion-icon name="briefcase-outline"></ion-icon>
            Recruiter
          </button>
          <button onclick="selectProfile('academic')" class="profile-btn">
            <ion-icon name="school-outline"></ion-icon>
            Academic
          </button>
          <button onclick="selectProfile('explorer')" class="profile-btn">
            <ion-icon name="compass-outline"></ion-icon>
            Explorer
          </button>
        </div>
      </div>
    </div>

    <!-- Profile Switcher -->
    <div class="profile-switcher">
      <button onclick="toggleProfileMenu()" class="profile-switcher-btn">
        <ion-icon name="people-outline"></ion-icon>
        Switch Profile
      </button>
      <div id="profileMenu" class="profile-menu">
        <button onclick="selectProfile('recruiter')">Recruiter</button>
        <button onclick="selectProfile('academic')">Academic</button>
        <button onclick="selectProfile('explorer')">Explorer</button>
      </div>
    </div>

    <main>
      <aside class="sidebar" data-sidebar>
        <div class="sidebar-info">
          <img src="assets/Dibboslogo1.svg" alt="Dibbo logo" width="200vh" />
          <figure class="avatar-box">
            <img src="./assets/images/profile-pic.jpg" alt="Dibbo Das Avi" width="180" />
          </figure>

          <button class="info_more-btn" data-sidebar-btn>
            <span>Show Contacts</span>
            <ion-icon name="chevron-down"></ion-icon>
          </button>
        </div>

        <div class="sidebar-info_more">
          <div class="separator"></div>

          <ul class="contacts-list">
            <li class="contact-item">
              <div class="icon-box">
                <ion-icon name="mail-outline"></ion-icon>
              </div>

              <div class="contact-info">
                <p class="contact-title">Email</p>
                <a href="mailto:dibbodasavi@gmail.com" class="contact-link">Dibbodasavi@gmail.com</a>
              </div>
            </li>

            <li class="contact-item">
              <div class="icon-box">
                <ion-icon name="phone-portrait-outline"></ion-icon>
              </div>

              <div class="contact-info">
                <p class="contact-title">Phone</p>
                <a href="tel:+8801871126615" class="contact-link">+880 18711 26615</a>
              </div>
            </li>

            <li class="contact-item">
              <div class="icon-box">
                <ion-icon name="calendar-outline"></ion-icon>
              </div>

              <div class="contact-info">
                <p class="contact-title">Resume</p>
                <a href="https://drive.google.com/file/d/1eEe2yB1J_VXSkPptFfptkTh-qnT-tspw/view?usp=sharing" class="contact-link" id="Resume">Dibbo's CV.pdf</a>
              </div>
            </li>

            <li class="contact-item">
              <div class="icon-box">
                <ion-icon name="location-outline"></ion-icon>
              </div>

              <div class="contact-info">
                <p class="contact-title">Location</p>
                <address>Bangladesh</address>
              </div>
            </li>
          </ul>

          <div class="separator"></div>

          <ul class="social-list">
            <li class="social-item">
              <a href="https://www.facebook.com/dibbodasavi" class="social-link" target="_blank">
                <ion-icon name="logo-facebook"></ion-icon>
              </a>
            </li>

            <li class="social-item">
              <a href="https://www.instagram.com/kakarottosaitama" class="social-link">
                <ion-icon name="logo-instagram"></ion-icon>
              </a>
            </li>

            <li class="social-item">
              <a href="https://www.behance.net/dibbodasavi" class="social-link">
                <ion-icon name="logo-behance"></ion-icon>
              </a>
            </li>
            <li class="social-item">
              <a href="https://github.com/Dibbodasavi" class="social-link">
                <ion-icon name="logo-github"></ion-icon>
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <div class="main-content">
        <nav class="navbar">
          <ul class="navbar-list" id="dynamicNav">
            <!-- Navigation items will be populated by JavaScript -->
          </ul>
        </nav>

        <article class="about active" data-page="about">
          <!-- Your existing about content -->
        </article>

        <article class="resume" data-page="resume">
          <!-- Your existing resume content -->
        </article>

        <article class="portfolio" data-page="portfolio" data-profile="recruiter">
          <!-- Your existing portfolio content -->
        </article>

        <article class="blog" data-page="blog">
          <!-- Your existing blog content -->
        </article>

        <article class="contact" data-page="contact">
          <!-- Your existing contact content -->
        </article>
      </div>
    </main>

    <script src="./assets/js/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  </body>
</html>
